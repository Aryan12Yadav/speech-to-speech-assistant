<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card bg-secondary p-4 text-center" style="width: 400px;">

        <h3>🎤 Voice Assistant</h3>

        <p id="status">Click Start and speak</p>

        <div class="mt-3">
            <button class="btn btn-success" onclick="startRecording()">Start</button>
            <button class="btn btn-danger" onclick="stopRecording()">Stop</button>
        </div>

        <div class="mt-4 text-start">
            <h6>User:</h6>
            <p id="userText"></p>

            <h6>Bot:</h6>
            <p id="botText"></p>
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
